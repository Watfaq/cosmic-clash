name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Allow manual triggering

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Basic compilation and linting
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --all-features

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

  # Build and test on Linux
  build-linux:
    name: Build Linux
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build debug version
        run: cargo build --verbose

      - name: Build release version
        run: cargo build --release --verbose

      - name: Run tests (if any)
        run: cargo test --verbose

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cosmic-clash-linux-debug
          path: target/debug/cosmic-clash
          retention-days: 7

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cosmic-clash-linux-release
          path: target/release/cosmic-clash
          retention-days: 7

  # Build for Windows (cross-compilation)
  build-windows:
    name: Build Windows
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-windows-cargo-

      - name: Build for Windows
        run: |
          cargo build --release --target x86_64-pc-windows-gnu --verbose

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cosmic-clash-windows
          path: target/x86_64-pc-windows-gnu/release/cosmic-clash.exe
          retention-days: 7

  # Build for macOS (cross-compilation)
  build-macos:
    name: Build macOS
    needs: check
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install system dependencies
        run: |
          brew install pkg-config openssl

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build for macOS
        run: |
          cargo build --release --target x86_64-apple-darwin --verbose

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cosmic-clash-macos
          path: target/x86_64-apple-darwin/release/cosmic-clash
          retention-days: 7

  # Create release when tag is pushed
  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure of downloaded files
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cosmic-clash-linux-release/cosmic-clash
            cosmic-clash-windows/cosmic-clash.exe
            cosmic-clash-macos/cosmic-clash
          generate_release_notes: true
          draft: false
          prerelease: false