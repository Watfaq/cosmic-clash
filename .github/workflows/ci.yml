name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Allow manual triggering

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Basic compilation and linting on Linux
  check:
    name: Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --all-features

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

  # Build on Linux
  build-linux:
    name: Build Linux
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build debug version
        run: cargo build --verbose

      - name: Build release version
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose || echo "Tests may fail due to GUI dependencies"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cosmic-clash-linux
          path: |
            target/debug/cosmic-clash
            target/release/cosmic-clash
          retention-days: 7

  # Build on Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build debug version
        run: cargo build --verbose

      - name: Build release version
        run: cargo build --release --verbose

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cosmic-clash-windows
          path: |
            target/debug/cosmic-clash.exe
            target/release/cosmic-clash.exe
          retention-days: 7

  # Build on macOS
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build debug version
        run: cargo build --verbose

      - name: Build release version
        run: cargo build --release --verbose

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cosmic-clash-macos
          path: |
            target/debug/cosmic-clash
            target/release/cosmic-clash
          retention-days: 7

  # Create release when tag is pushed
  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cosmic-clash-linux/cosmic-clash
            cosmic-clash-windows/cosmic-clash.exe
            cosmic-clash-macos/cosmic-clash
          generate_release_notes: true
          draft: false
          prerelease: false