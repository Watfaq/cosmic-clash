name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: |
          cargo build --verbose
          cargo build --release --verbose

      - name: Run tests
        run: |
          cargo test --verbose || echo "Tests may fail due to GUI dependencies"

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-clash-linux
          path: |
            target/debug/cosmic-clash
            target/release/cosmic-clash
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: |
          cargo build --verbose
          cargo build --release --verbose

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-clash-windows
          path: |
            target/debug/cosmic-clash.exe
            target/release/cosmic-clash.exe
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: |
          cargo build --verbose
          cargo build --release --verbose

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-clash-macos
          path: |
            target/debug/cosmic-clash
            target/release/cosmic-clash
          retention-days: 7