name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu]
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            deps: |
              sudo apt-get update
              sudo apt-get install -y \
                pkg-config \
                libssl-dev \
                libxkbcommon-dev \
                libwayland-dev \
                libgl1-mesa-dev
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            deps: |
              sudo apt-get update
              sudo apt-get install -y \
                gcc-mingw-w64-x86-64 \
                g++-mingw-w64-x86-64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: ${{ matrix.deps }}

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cargo build --verbose
            cargo build --release --verbose
          else
            cargo build --target ${{ matrix.target }} --verbose
            cargo build --release --target ${{ matrix.target }} --verbose
          fi

      - name: Run tests
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cargo test --verbose || echo "Tests may fail due to GUI dependencies"
          fi

      - name: Upload artifacts
        if: success() && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-clash-${{ matrix.target }}
          path: |
            target/debug/cosmic-clash
            target/release/cosmic-clash
          retention-days: 7