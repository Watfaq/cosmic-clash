name: Code Quality

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-quality-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-quality-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check for common issues
        run: |
          # Check for unused dependencies
          cargo +nightly udeps --all-targets || echo "udeps check skipped (requires nightly)"
          
          # Check for security vulnerabilities
          cargo audit || echo "cargo audit not available"

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Check documentation
        run: cargo doc --no-deps --all-features

      - name: Generate dependency graph
        run: |
          cargo deps --all-deps | dot -Tpng > deps.png || echo "Graph generation failed"
        continue-on-error: true

      - name: Upload dependency graph
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dependency-graph
          path: deps.png
          retention-days: 1